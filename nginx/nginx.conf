events {}

http {

    log_format api_log '$remote_addr - "$request" → Backend: $upstream_addr';
    log_format main '$remote_addr - - [$time_local] "$request" $status';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log error;

    upstream backend_servers {
        server fastapi:8001;
        server django:8002;
        server node:8003;
        server dotnet:8004;
    }

    server {
        listen 80;

        # ✅ Health
        location = /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # 🔥 ROUND ROBIN
        location /api/ {
            access_log /var/log/nginx/access.log api_log;

            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend_servers;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 🔥 FASTAPI
        location /api/fastapi/ {
            rewrite ^/api/fastapi/(.*) /$1 break;
            proxy_pass http://fastapi:8001;
        }

        # 🔥 DJANGO
        location /api/django/ {
            rewrite ^/api/django/(.*) /$1 break;
            proxy_pass http://django:8002;
        }

        # 🔥 NODE
        location /api/node/ {
            rewrite ^/api/node/(.*) /$1 break;
            proxy_pass http://node:8003;
        }

        # 🔥 DOTNET
        location /api/dotnet/ {
            rewrite ^/api/dotnet/(.*) /$1 break;
            proxy_pass http://dotnet:8004;
        }

        # 📊 PROMETHEUS
        location /prometheus/ {
            proxy_pass http://prometheus:9090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Prometheus specific settings
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # 📈 GRAFANA
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for Grafana live features
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Increase timeouts for long-running queries
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # 🚨 ALERTMANAGER
        location /alertmanager/ {
            proxy_pass http://alertmanager:9093/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Alertmanager specific settings
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering off;
        }

        # NGINX Status for Prometheus
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.2.50;
            allow 172.0.0.0/8;
            deny all;
        }

	# Default route
        location = / {
            return 200 "Backend is running 🚀";
        }
        
        # Catch-all for any other routes
        location / {
            return 404 "Not Found";
        }
    }
}
