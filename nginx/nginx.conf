events {}

http {
    log_format custom '$remote_addr - [$time_local] "$request" '
                      '→ service: $upstream_addr';

    access_log /var/log/nginx/access.log custom;

    server {
        listen 80;

        location /fastapi/ {
            rewrite ^/fastapi/(.*)$ /$1 break;
            proxy_pass http://fastapi:8001;

            proxy_set_header Host $host;
        }

        location /django/ {
            rewrite ^/django/(.*)$ /$1 break;
            proxy_pass http://django:8002;

            proxy_set_header Host $host;   # 🔥 THIS FIXES YOUR ERROR
        }

        location /node/ {
            rewrite ^/node/(.*)$ /$1 break;
            proxy_pass http://node:8003;

            proxy_set_header Host $host;
        }

        location /dotnet/ {
            rewrite ^/dotnet/(.*)$ /$1 break;
            proxy_pass http://dotnet:8004;

            proxy_set_header Host $host;
        }
    }
}