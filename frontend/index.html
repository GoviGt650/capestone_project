<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<!-- 🔐 LOGIN -->
<div id="loginPage" class="w-full max-w-md bg-white shadow-xl rounded-2xl p-6">
  <h2 class="text-xl font-bold mb-4 text-center">Login</h2>

  <input id="loginUser" placeholder="Username"
    class="w-full mb-2 px-4 py-2 border rounded-lg">

  <input id="loginPass" type="password" placeholder="Password"
    class="w-full mb-2 px-4 py-2 border rounded-lg">

  <button onclick="login()"
    class="w-full bg-blue-500 text-white py-2 rounded-lg">
    Login
  </button>

  <div id="loginError" class="hidden mt-3 p-2 bg-red-100 text-red-700 rounded"></div>
</div>

<!-- 🟢 MAIN APP -->
<div id="app" class="hidden w-full max-w-2xl bg-white shadow-xl rounded-2xl p-6">

  <h1 class="text-2xl font-bold text-center mb-2">User Management</h1>

  <!-- COUNT -->
  <h3 id="userCount" class="text-center mb-4 text-gray-600">Total Users: 0</h3>

  <!-- ERROR / SUCCESS -->
  <div id="errorCard" class="hidden mb-2 p-2 bg-red-100 text-red-700 rounded"></div>
  <div id="successCard" class="hidden mb-2 p-2 bg-green-100 text-green-700 rounded"></div>

  <!-- ADD -->
  <div class="flex gap-2 mb-4">
    <input id="username"
      placeholder="Enter user name"
      class="flex-1 px-4 py-2 border rounded-lg">

    <button onclick="addUser()"
      class="bg-blue-500 text-white px-4 py-2 rounded-lg">
      Add
    </button>
  </div>

  <!-- REFRESH -->
  <button onclick="getUsers()"
    class="w-full mb-4 bg-gray-800 text-white py-2 rounded-lg">
    Refresh Users
  </button>

  <!-- LIST -->
  <ul id="userList" class="space-y-2"></ul>

</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
